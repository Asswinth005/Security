<head>

    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary-navy': '#0A1928',
                        'secondary-charcoal': '#1E2A36',
                        'accent-gold': '#D4AF37',

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Fullscreen lock - exactly one screen */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #0A1928 0%, #0F1A24 100%);
            color: #E5E7EB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .dark body {

            color: #E5E7EB;
        }
        
        /* Security pattern overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        
        /* Theme toggle buttons - top right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }
        
        .toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 42, 54, 0.8);
            backdrop-filter: blur(8px);
            color: #D4AF37;
            transition: all 0.2s ease;
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .dark .toggle-btn {
            background: rgba(22, 33, 43, 0.9);
            color: #D4AF37;
            border-color: rgba(212, 175, 55, 0.4);
        }
        
        .toggle-btn:hover {
            background: #D4AF37;
            color: #0A1928;
            border-color: #D4AF37;
            transform: translateY(-2px);
        }
        
        .dark .toggle-btn:hover {
            background: #D4AF37;
            color: #0A1928;
        }
        
        .toggle-btn.active {
            background: #D4AF37;
            color: #0A1928;
            border-color: #D4AF37;
        }
        
        /* Login Card - Sentinel Theme - FIXED CENTERING */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(212, 175, 55, 0.25);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            position: relative;
            backdrop-filter: blur(0px);
        }
        
        .dark .login-card {
            background: #16212B;
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        
        /* Main container - ensures proper centering */
        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            z-index: 10;
        }
        
        /* Input fields - security style */
        .login-input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            border-radius: 14px;
            border: 1.5px solid #E5E7EB;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1E2A36;
            font-weight: 500;
        }
        
        .dark .login-input {
            background: #0F1A24;
            border-color: #2D3A46;
            color: #F3F4F6;
        }
        
        .login-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        /* Password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        
        .password-wrapper .login-input {
            padding-right: 3rem;
        }
        
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            font-size: 1.1rem;
            background: transparent;
            border: none;
            z-index: 5;
            transition: color 0.2s;
        }
        
        .toggle-password:hover {
            color: #D4AF37;
        }
        
        .dark .toggle-password {
            color: #9CA3AF;
        }
        
        .dark .toggle-password:hover {
            color: #D4AF37;
        }
        
        /* Input icons */
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 1rem;
            pointer-events: none;
        }
        
        /* Sentinel Button */
        .sentinel-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B4942C 100%);
            color: #0A1928;
            font-weight: 700;
            padding: 0.9rem 1.8rem;

        .sentinel-btn:hover {

        }
        
        /* Social buttons */
        .social-btn {
            flex: 1;

            border-radius: 14px;

            background: white;
            color: #1E2A36;

        @media (max-width: 380px) {

        /* Ensure proper flex centering */
        .flex-center {
            display: flex;

            justify-content: center;

        /* Prevent autofill background color */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,

        input:-webkit-autofill:active {

    </style>
</head>
<body>

    <!-- Theme Toggle Buttons - Top Right -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Toggle theme">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun hidden"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="Toggle RTL/LTR">
            ⇄
        </button>
    </div>

    <!-- Main Login Container - Properly Centered -->
    <div class="flex-center">
        <div class="login-container">
            
            <!-- Login Card -->
            <div class="login-card animate-slide-up">
                
                <!-- Logo Section -->
                <div class="text-center">
                    <a href="index.html" class="inline-flex items-center justify-center space-x-3 rtl:space-x-reverse group">
                        <div class="w-10 h-10 bg-accent-gold rounded-lg flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">

                        </div>
                        <div><span class="text-2xl font-display font-bold tracking-tight text-neutral-dark dark:text-white">SENTINEL</span></div>
                    </a>
                    
                    <h1 class="welcome-title mt-5 text-2xl">Secure Access</h1>
                    <p class="welcome-subtitle">Sign in to your investigator portal</p>
                </div>

                <!-- Login Form -->
                <form class="space-y-5 mt-6" id="loginForm" autocomplete="off">
                    
                    <!-- Email / Username Field - Disabled autocomplete -->
                    <div class="relative">
                        <span class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" name="email" placeholder="Email address" required
                               class="login-input text-sm md:text-base"
                               autocomplete="off"
                               autocomplete="new-email"
                               readonly
                               onfocus="this.removeAttribute('readonly')">
                    </div>

                    <!-- Password Field with Toggle -->
                    <div class="password-wrapper">
                        <span class="input-icon">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="login-password" name="password" placeholder="Password" required
                               class="login-input text-sm md:text-base"
                               autocomplete="off"
                               autocomplete="new-password">

                    <!-- Sign In Button -->
                    <button type="submit" class="sentinel-btn mt-2" id="signInBtn">

                    </button>
                    
                    <!-- Divider -->
                    <div class="relative my-5">
                        <div class="absolute inset-0 flex items-center">

                                or continue with

                            <span>Don't have an account? Sign up</span>

        </div>

    <!-- JavaScript: Theme, RTL, Password Toggle, Form Validation -->
    <script>
        (function() {
            // ---------- THEME TOGGLE ----------
            const themeToggle = document.getElementById('theme-toggle');
            const themeIconMoon = themeToggle?.querySelector('.fa-moon');
            const themeIconSun = themeToggle?.querySelector('.fa-sun');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    if (themeIconMoon) themeIconMoon.classList.add('hidden');
                    if (themeIconSun) themeIconSun.classList.remove('hidden');
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    if (themeIconMoon) themeIconMoon.classList.remove('hidden');
                    if (themeIconSun) themeIconSun.classList.add('hidden');
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            
            const savedTheme = localStorage.getItem('theme');
            savedTheme === 'dark' ? setTheme(true) : setTheme(false);

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL TOGGLE ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- PASSWORD VISIBILITY TOGGLE ----------
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    if (passwordInput) {
                        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordInput.setAttribute('type', type);
                        const icon = this.querySelector('i');
                        if (icon) {
                            if (type === 'text') {
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                            } else {
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                            }
                        }
                    }
                });
            });

            // ---------- FORGOT PASSWORD DEMO ----------
            const forgotLink = document.getElementById('forgotPasswordLink');
            if (forgotLink) {
                forgotLink.addEventListener('click', (e) => { 
                    e.preventDefault(); 
                    alert('🔐 Password reset instructions have been sent to your registered email address.'); 
                });
            }

            // ---------- SIGN IN FORM SUBMISSION WITH VALIDATION ----------
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('login-email');
            const passwordInputField = document.getElementById('login-password');
            const rememberCheckbox = document.getElementById('rememberCheckbox');
            
            // Clear any saved email from localStorage on page load
            if (localStorage.getItem('savedEmail')) {
                localStorage.removeItem('savedEmail');
            }
            
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const email = emailInput?.value.trim() || '';
                    const password = passwordInputField?.value.trim() || '';
                    
                    if (email === '') {
                        alert('⚠️ Please enter your email address.');
                        emailInput?.focus();
                        return;
                    }
                    
                    if (password === '') {
                        alert('⚠️ Please enter your password.');
                        passwordInputField?.focus();
                        return;
                    }
                    
                    // Simple email validation
                    const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                    if (!emailPattern.test(email)) {
                        alert('⚠️ Please enter a valid email address.');
                        emailInput?.focus();
                        return;
                    }
                    
                    // All fields are filled - show success and redirect
                    alert('✓ Authentication successful! Redirecting to dashboard...');
                    window.location.href = 'index.html';
                });
            }
            
            // ---------- GOOGLE LOGIN ----------
            const googleBtn = document.getElementById('googleLogin');
            if (googleBtn) {
                googleBtn.addEventListener('click', () => {
                    alert('🔐 Google Sign-In will be available soon. Redirecting to home page...');
                    window.location.href = 'index.html';
                });
            }
            
            // ---------- APPLE LOGIN ----------
            const appleBtn = document.getElementById('appleLogin');
            if (appleBtn) {
                appleBtn.addEventListener('click', () => {
                    alert('🍎 Apple Sign-In will be available soon. Redirecting to home page...');
                    window.location.href = 'index.html';
                });
            }
            
            // Clear email field on page load to prevent any cached data
            if (emailInput) {
                emailInput.value = '';
            }
            
            // Additional prevention: clear on page load
            window.addEventListener('load', function() {
                if (emailInput) {
                    emailInput.value = '';
                }
            });
        })();
    </script>
</body>
</html>
