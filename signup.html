<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sentinel | Create Account</title>
    <!-- Sentinel Favicon - Magnifying Glass & Shield -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231E2A36'/%3E%3Cpath fill='%23D4AF37' d='M50 25 L70 40 L70 60 L50 75 L30 60 L30 40 Z'/%3E%3Ccircle cx='50' cy='50' r='12' fill='none' stroke='%23D4AF37' stroke-width='3'/%3E%3Cpath fill='%23D4AF37' d='M60 58 L68 66 L65 69 L57 61 Z'/%3E%3C/svg%3E">
    
    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary-navy': '#0A1928',
                        'secondary-charcoal': '#1E2A36',
                        'accent-gold': '#D4AF37',
                        'accent-gold-dark': '#B4942C',
                        'neutral-dark': '#0F1A24',
                        'neutral-light': '#F5F7FA',
                        'dark-bg': '#000000',
                        'dark-card': '#1A1A1A'
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'display': ['Lexend', 'Inter', 'sans-serif']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'float': 'float 6s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } }
                    },
                    backgroundImage: {
                        'security-pattern': "radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 60%)",
                    }
                }
            }
        }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Fullscreen layout - exactly one screen */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #0A1928 0%, #0F1A24 100%);
            color: #E5E7EB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .dark body {
            background: linear-gradient(135deg, #000000 0%, #0F1A24 100%);
            color: #E5E7EB;
        }
        
        /* Security pattern overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        
        /* Theme toggle buttons - top right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }
        
        .toggle-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 42, 54, 0.8);
            backdrop-filter: blur(8px);
            color: #D4AF37;
            transition: all 0.2s ease;
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .dark .toggle-btn {
            background: rgba(22, 33, 43, 0.9);
            color: #D4AF37;
            border-color: rgba(212, 175, 55, 0.4);
        }
        
        .toggle-btn:hover {
            background: #D4AF37;
            color: #0A1928;
            border-color: #D4AF37;
            transform: translateY(-2px);
        }
        
        .dark .toggle-btn:hover {
            background: #D4AF37;
            color: #0A1928;
        }
        
        .toggle-btn.active {
            background: #D4AF37;
            color: #0A1928;
            border-color: #D4AF37;
        }
        
        /* Main container - ensures proper centering */
        .signup-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            z-index: 10;
        }
        
        /* Signup Card - Reduced size for mobile fit */
        .signup-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 1.5rem 1.5rem 1.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.25);
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            position: relative;
        }
        
        .dark .signup-card {
            background: #1A1A1A;
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Input fields - compact size */
        .signup-input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.6rem;
            border-radius: 12px;
            border: 1.5px solid #E5E7EB;
            background: white;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: #1E2A36;
            font-weight: 500;
        }
        
        .dark .signup-input {
            background: #0F1A24;
            border-color: #2D3A46;
            color: #F3F4F6;
        }
        
        .signup-input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }
        
        /* Password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        
        .password-wrapper .signup-input {
            padding-right: 2.5rem;
        }
        
        .toggle-password {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            font-size: 0.9rem;
            background: transparent;
            border: none;
            z-index: 5;
            transition: color 0.2s;
        }
        
        .toggle-password:hover {
            color: #D4AF37;
        }
        
        .dark .toggle-password {
            color: #9CA3AF;
        }
        
        .dark .toggle-password:hover {
            color: #D4AF37;
        }
        
        /* Input icons */
        .input-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 0.85rem;
            pointer-events: none;
        }
        
        /* Sentinel Button - Compact */
        .sentinel-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B4942C 100%);
            color: #0A1928;
            font-weight: 700;
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        
        .sentinel-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
        }
        
        /* Social buttons row */
        .social-btn-row {
            display: flex;
            flex-direction: row;
            gap: 0.8rem;
            width: 100%;
        }
        
        .social-btn {
            flex: 1;
            padding: 0.6rem 0.3rem;
            border-radius: 12px;
            border: 1.5px solid #E5E7EB;
            background: white;
            color: #1E2A36;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .dark .social-btn {
            background: #0F1A24;
            border-color: #2D3A46;
            color: #E5E7EB;
        }
        
        .social-btn:hover {
            background: #F5F7FA;
            border-color: #D4AF37;
            transform: translateY(-2px);
        }
        
        .dark .social-btn:hover {
            background: #1E2A36;
            border-color: #D4AF37;
        }
        
        .social-btn i {
            font-size: 1rem;
            color: #D4AF37;
        }
        
        /* Logo animation */
        .logo-icon {
            transition: transform 0.3s ease;
        }
        
        a:hover .logo-icon {
            transform: rotate(8deg) scale(1.05);
        }
        
        /* RTL adjustments */
        [dir="rtl"] .signup-input {
            padding: 0.7rem 2.6rem 0.7rem 1rem;
        }
        
        [dir="rtl"] .input-icon {
            left: auto;
            right: 0.8rem;
        }
        
        [dir="rtl"] .toggle-password {
            right: auto;
            left: 0.8rem;
        }
        
        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 24px;
        }
        
        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }
        
        /* Welcome text styles - Compact */
        .welcome-title {
            font-family: 'Lexend', 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #0A1928;
            margin-top: 0.5rem;
            margin-bottom: 0.2rem;
            text-align: center;
            letter-spacing: -0.3px;
        }
        
        .dark .welcome-title {
            color: white;
        }
        
        .welcome-subtitle {
            font-size: 0.75rem;
            color: #6B7280;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .dark .welcome-subtitle {
            color: #9CA3AF;
        }
        
        /* Terms text - Compact */
        .terms-text {
            font-size: 0.65rem;
            color: #6B7280;
            line-height: 1.3;
        }
        
        .dark .terms-text {
            color: #9CA3AF;
        }
        
        .terms-link {
            color: #D4AF37;
            font-weight: 600;
            text-decoration: none;
        }
        
        .terms-link:hover {
            text-decoration: underline;
            color: #B4942C;
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 0.8rem 0 0.8rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .dark .divider::before,
        .dark .divider::after {
            border-bottom-color: #2D3A46;
        }
        
        .divider span {
            font-size: 0.7rem;
            padding: 0 0.7rem;
            color: #6B7280;
            font-weight: 500;
        }
        
        .dark .divider span {
            color: #9CA3AF;
        }
        
        /* Form spacing - Compact */
        .space-y-3 > :not([hidden]) ~ :not([hidden]) {
            margin-top: 0.75rem;
        }
        
        /* Logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Checkbox styling */
        .checkbox-custom {
            width: 14px;
            height: 14px;
            margin-top: 2px;
            accent-color: #D4AF37;
        }
        
        /* Flex center helper */
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        
        /* Mobile specific adjustments - ensures card fits perfectly */
        @media (max-width: 480px) {
            .signup-card {
                padding: 1.2rem 1.2rem 1.2rem;
                border-radius: 24px;
                max-width: 100%;
                margin: 0;
            }
            
            .signup-container {
                padding: 0.75rem;
            }
            
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
                gap: 8px;
            }
            
            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
                right: auto;
            }
            
            .toggle-btn {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            
            .welcome-title {
                font-size: 1.25rem;
                margin-top: 0.25rem;
            }
            
            .welcome-subtitle {
                font-size: 0.7rem;
                margin-bottom: 0.75rem;
            }
            
            .signup-input {
                padding: 0.6rem 0.9rem 0.6rem 2.3rem;
                font-size: 0.8rem;
            }
            
            .input-icon {
                left: 0.7rem;
                font-size: 0.8rem;
            }
            
            [dir="rtl"] .signup-input {
                padding: 0.6rem 2.3rem 0.6rem 0.9rem;
            }
            
            [dir="rtl"] .input-icon {
                left: auto;
                right: 0.7rem;
            }
            
            .sentinel-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
            
            .social-btn-row {
                gap: 0.6rem;
            }
            
            .social-btn {
                padding: 0.5rem 0.2rem;
                font-size: 0.75rem;
                gap: 0.4rem;
            }
            
            .social-btn i {
                font-size: 0.9rem;
            }
            
            .divider {
                margin: 0.6rem 0;
            }
            
            .divider span {
                font-size: 0.65rem;
                padding: 0 0.5rem;
            }
            
            .terms-text {
                font-size: 0.6rem;
            }
            
            .space-y-3 > :not([hidden]) ~ :not([hidden]) {
                margin-top: 0.6rem;
            }
            
            .logo-icon {
                width: 32px;
                height: 32px;
            }
            
            .logo-icon i {
                font-size: 0.9rem;
            }
            
            .logo-text {
                font-size: 1.1rem;
            }
        }
        
        /* For very small phones (below 380px) - even more compact */
        @media (max-width: 380px) {
            .signup-card {
                padding: 1rem 1rem 1rem;
            }
            
            .social-btn span {
                display: none;
            }
            
            .social-btn i {
                font-size: 1.1rem;
                margin: 0;
            }
            
            .social-btn {
                padding: 0.55rem 0;
            }
            
            .welcome-title {
                font-size: 1.1rem;
            }
            
            .signup-input {
                padding: 0.55rem 0.8rem 0.55rem 2rem;
                font-size: 0.75rem;
            }
            
            .input-icon {
                font-size: 0.75rem;
            }
            
            .sentinel-btn {
                padding: 0.55rem 0.8rem;
                font-size: 0.8rem;
            }
            
            .terms-text {
                font-size: 0.55rem;
            }
        }
        
        /* Height adjustments for smaller screens */
        @media (max-height: 700px) {
            .signup-card {
                padding: 1rem 1.2rem 1rem;
            }
            
            .welcome-title {
                margin-top: 0.2rem;
            }
            
            .welcome-subtitle {
                margin-bottom: 0.5rem;
            }
            
            .space-y-3 > :not([hidden]) ~ :not([hidden]) {
                margin-top: 0.5rem;
            }
            
            .divider {
                margin: 0.5rem 0;
            }
        }
        
        /* Hidden utility */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Theme Toggle Buttons - Top Right -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Toggle theme">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun hidden"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="Toggle RTL/LTR">
            ⇄
        </button>
    </div>

    <!-- Main Signup Container - Properly Centered -->
    <div class="flex-center">
        <div class="signup-container">
            
            <!-- Signup Card -->
            <div class="signup-card animate-slide-up">
                
                <!-- Logo Section -->
                <div class="text-center">
                    <a href="index.html" class="inline-flex items-center justify-center space-x-2 rtl:space-x-reverse group">
                        <div class="w-9 h-9 bg-accent-gold rounded-lg flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                            <i class="fas fa-user-secret text-primary-navy text-md"></i>
                        </div>
                        <div><span class="text-xl font-display font-bold tracking-tight text-neutral-dark dark:text-white logo-text">SENTINEL</span></div>
                    </a>
                    
                    <h1 class="welcome-title">Join Sentinel</h1>
                    <p class="welcome-subtitle">Create your investigator account</p>
                </div>

                <!-- Signup Form -->
                <form class="space-y-3" onsubmit="event.preventDefault(); handleSignup();">
                    
                    <!-- Full Name Field -->
                    <div class="relative">
                        <span class="input-icon">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="fullname" name="name" placeholder="Full name" required
                               class="signup-input">
                    </div>

                    <!-- Email Field -->
                    <div class="relative">
                        <span class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" name="email" placeholder="Email address" required
                               class="signup-input">
                    </div>

                    <!-- Password Field with Eye Icon -->
                    <div class="password-wrapper">
                        <span class="input-icon">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="signup-password" name="password" placeholder="Password (min. 8 characters)" required
                               class="signup-input">
                        <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">
                            <i class="far fa-eye-slash"></i>
                        </button>
                    </div>

                    <!-- Confirm Password Field with Eye Icon -->
                    <div class="password-wrapper">
                        <span class="input-icon">
                            <i class="fas fa-shield-alt"></i>
                        </span>
                        <input type="password" id="signup-confirm-password" name="confirm_password" placeholder="Confirm password" required
                               class="signup-input">
                        <button type="button" class="toggle-password" data-target="signup-confirm-password" aria-label="Show password">
                            <i class="far fa-eye-slash"></i>
                        </button>
                    </div>

                    <!-- Terms and Conditions Checkbox -->
                    <div class="flex items-start gap-2 mt-1">
                        <input type="checkbox" id="terms" class="checkbox-custom mt-0.5" required>
                        <label for="terms" class="terms-text">
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                        </label>
                    </div>

                    <!-- Sign Up Button -->
                    <button type="submit" class="sentinel-btn mt-1">
                        <i class="fas fa-user-shield mr-2 rtl:ml-2 rtl:mr-0"></i>
                        Create Secure Account
                    </button>
                </form>
                
                <!-- Divider -->
                <div class="divider">
                    <span>or sign up with</span>
                </div>

                <!-- Social Login Buttons - Google and Apple (LinkedIn removed) -->
                <div class="social-btn-row">
                    <button class="social-btn" id="googleSignupBtn">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn" id="appleSignupBtn">
                        <i class="fab fa-apple"></i>
                        <span>Apple</span>
                    </button>
                </div>

                <!-- Login Link -->
                <div class="mt-3 text-center">
                    <span class="text-xs text-gray-600 dark:text-gray-400">Already have an account?</span>
                    <a href="login.html" class="text-xs font-semibold text-accent-gold hover:text-accent-gold-dark ml-1 rtl:mr-1 hover:underline transition">
                        Sign in
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        (function() {
            // ---------- THEME TOGGLE ----------
            const themeToggle = document.getElementById('theme-toggle');
            const themeIconMoon = themeToggle?.querySelector('.fa-moon');
            const themeIconSun = themeToggle?.querySelector('.fa-sun');

            function setTheme(isDark) {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    if (themeIconMoon) themeIconMoon.classList.add('hidden');
                    if (themeIconSun) themeIconSun.classList.remove('hidden');
                    themeToggle?.classList.add('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    if (themeIconMoon) themeIconMoon.classList.remove('hidden');
                    if (themeIconSun) themeIconSun.classList.add('hidden');
                    themeToggle?.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }
            
            const savedTheme = localStorage.getItem('theme');
            savedTheme === 'dark' ? setTheme(true) : setTheme(false);

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    setTheme(!document.documentElement.classList.contains('dark'));
                });
            }

            // ---------- RTL TOGGLE ----------
            const rtlBtn = document.getElementById('rtl-toggle');
            function setRTL(isRTL) {
                if (isRTL) {
                    document.documentElement.dir = 'rtl';
                    rtlBtn?.classList.add('active');
                    localStorage.setItem('dir', 'rtl');
                } else {
                    document.documentElement.dir = 'ltr';
                    rtlBtn?.classList.remove('active');
                    localStorage.setItem('dir', 'ltr');
                }
            }
            
            const savedDir = localStorage.getItem('dir');
            savedDir === 'rtl' ? setRTL(true) : setRTL(false);

            if (rtlBtn) {
                rtlBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setRTL(document.documentElement.dir !== 'rtl');
                });
            }

            // ---------- PASSWORD VISIBILITY TOGGLE ----------
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const passwordInput = document.getElementById(targetId);
                    if (passwordInput) {
                        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordInput.setAttribute('type', type);
                        const icon = this.querySelector('i');
                        if (icon) {
                            if (type === 'text') {
                                icon.classList.remove('fa-eye-slash');
                                icon.classList.add('fa-eye');
                            } else {
                                icon.classList.remove('fa-eye');
                                icon.classList.add('fa-eye-slash');
                            }
                        }
                    }
                });
            });

            // ---------- SOCIAL BUTTONS ----------
            const googleBtn = document.getElementById('googleSignupBtn');
            const appleBtn = document.getElementById('appleSignupBtn');
            
            if (googleBtn) {
                googleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    alert('🔐 Google authentication: Redirecting to secure sign-in portal.');
                });
            }
            if (appleBtn) {
                appleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    alert('🍎 Apple authentication: Secure sign-in with Face ID / Touch ID.');
                });
            }

            // ---------- TERMS LINK DEMO ----------
            document.querySelectorAll('.terms-link').forEach(link => {
                link.addEventListener('click', (e) => { 
                    e.preventDefault(); 
                    alert('📋 Sentinel Terms of Service & Privacy Policy: All data is protected under strict confidentiality agreements.'); 
                });
            });

            // ---------- SIGNUP HANDLER ----------
            window.handleSignup = function() {
                const fullname = document.getElementById('fullname')?.value.trim();
                const email = document.getElementById('email')?.value.trim();
                const password = document.getElementById('signup-password')?.value;
                const confirm = document.getElementById('signup-confirm-password')?.value;
                const termsCheck = document.getElementById('terms');
                
                if (!fullname) {
                    alert('⚠️ Please enter your full name.');
                    return false;
                }
                
                if (!email) {
                    alert('⚠️ Please enter your email address.');
                    return false;
                }
                
                const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    alert('⚠️ Please enter a valid email address.');
                    return false;
                }
                
                if (!password) {
                    alert('⚠️ Please enter a password.');
                    return false;
                }
                
                if (password.length < 8) {
                    alert('⚠️ Password must be at least 8 characters for security compliance.');
                    return false;
                }
                
                if (password !== confirm) {
                    alert('⚠️ Passwords do not match. Please verify your credentials.');
                    return false;
                }
                
                if (!termsCheck.checked) {
                    alert('📜 Please accept the Terms of Service and Privacy Policy to continue.');
                    return false;
                }
                
                alert('✓ Account created successfully! Welcome to Sentinel. Redirecting to login...');
                window.location.href = 'login.html';
                return true;
            };
        })();
    </script>
</body>
</html>
